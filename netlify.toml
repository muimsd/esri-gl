[build]
  publish = "docs/build"
  command = "cd docs && npm install && npm run build"

[build.environment]
  NODE_VERSION = "22"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache hashed assets (Docusaurus outputs these with content hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Allow examples to be embedded in iframes from same origin
[[headers]]
  for = "/examples/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
